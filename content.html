<style>
    body {
        background-color: #000;
        color: #0f0;
        font-family: 'Courier New', monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }
    .container {
        text-align: center;
        width: 90%;
        max-width: 600px;
    }
    .tool-card {
        background: rgba(0, 20, 0, 0.8);
        border: 1px solid #0f0;
        padding: 20px;
        margin: 20px 0;
        box-shadow: 0 0 15px #0f0;
    }
    textarea {
        width: 100%;
        height: 80px;
        background: #000;
        color: #0f0;
        border: 1px solid #0f0;
        padding: 10px;
        margin-bottom: 10px;
        box-sizing: border-box;
    }
    button {
        background: #0f0;
        color: #000;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
    }
    button:hover {
        background: #008800;
        color: #fff;
    }
    .result {
        margin-top: 15px;
        padding: 10px;
        border-top: 1px dashed #0f0;
        word-break: break-all;
    }
</style>
<div class="container">
    <h1 class="glitch" data-text="UTILITY HUB">UTILITY HUB</h1>

    <!-- ၁။ Encryptor/Decryptor Section -->
    <div class="tool-card">
        <h3>[ SECRET MESSENGER ]</h3>
        <textarea id="cryptoText" placeholder="ပြောချင်တဲ့စာသားရိုက်ထည့်ပါ..."></textarea>
        <div class="buttons">
            <button onclick="encrypt()">ENCRYPT</button>
            <button onclick="decrypt()">DECRYPT</button>
        </div>
        <div id="cryptoResult" class="result"></div>
    </div>

    <!-- ၂။ Anonymous File Sharer Section -->
    <div class="tool-card">
        <h3>[ ANONYMOUS UPLOADER ]</h3>
        <input type="file" id="fileInput">
        <button onclick="uploadFile()">UPLOAD TO CLOUD</button>
        <div id="fileResult" class="result"></div>
    </div>
</div>

<script>
    async function uploadFile() {
    const fileInput = document.getElementById('fileInput');
    const fileResult = document.getElementById('fileResult');
    const file = fileInput.files[0];

    if (!file) {
        alert("ဖိုင်အရင်ဆုံးရွေးပါဦးဗျ!");
        return;
    }

    fileResult.innerText = "⚡ BYPASSING FIREWALL & UPLOADING...";
    fileResult.style.color = "#00ff00";

    let formData = new FormData();
    formData.append('file', file);

    try {
        // အခုတစ်ခါ အဆင်ပြေဆုံးဖြစ်တဲ့ Tmp.ninja API ကို သုံးကြည့်မယ်
        const response = await fetch('https://tmp.ninja/api.php?d=upload', {
            method: 'POST',
            body: formData
        });

        const result = await response.text(); // သူက link ကို text အနေနဲ့ ပြန်ပေးတာပါ

        if (result.includes('https://')) {
            fileResult.innerHTML = `
                <span style="color: #0f0;">[+] ACCESS GRANTED - UPLOAD SUCCESS!</span><br>
                <input type="text" value="${result}" readonly 
                       style="width: 80%; background: #000; color: #0f0; border: 1px solid #0f0; padding: 5px; margin-top: 10px;">
                <br><br>
                <a href="${result}" target="_blank" 
                   style="background: #0f0; color: #000; padding: 5px 10px; text-decoration: none; font-weight: bold;">
                   DOWNLOAD FILE
                </a>
            `;
        } else {
            fileResult.innerText = "[-] UPLOAD FAILED: SERVER REJECTED";
            fileResult.style.color = "#ff0000";
        }
    } catch (error) {
        console.error(error);
        fileResult.innerText = "[-] NETWORK ERROR: CLOUD CONNECTION FAILED";
        fileResult.style.color = "#ff0000";
    }
}
</script>
