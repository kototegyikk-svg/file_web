<!DOCTYPE html>
<html>
<head>
    <title>THE WHITE HAT - HUB</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; }
        .tool-card { border: 1px solid #0f0; margin: 20px auto; padding: 20px; max-width: 500px; background: rgba(0,20,0,0.8); }
        button { background: #0f0; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
        textarea { width: 90%; background: #000; color: #0f0; border: 1px solid #0f0; }
        .result { margin-top: 10px; color: #fff; }
    </style>
</head>
<body>
    <h1>[ UTILITY HUB ]</h1>
    
    <div class="tool-card">
        <h3>SECRET MESSENGER</h3>
        <textarea id="cryptoText"></textarea><br><br>
        <button onclick="encrypt()">ENCRYPT</button>
        <button onclick="decrypt()">DECRYPT</button>
        <div id="cryptoResult" class="result"></div>
    </div>

    <div class="tool-card">
        <h3>SYSTEM SCANNER</h3>
        <button onclick="scanSystem()">RUN SCAN</button>
        <div id="scanResult" class="result"></div>
    </div>

    <script>
        function encrypt() {
            let t = document.getElementById('cryptoText').value;
            document.getElementById('cryptoResult').innerText = btoa(t);
        }
        function decrypt() {
            let t = document.getElementById('cryptoText').value;
            try { document.getElementById('cryptoResult').innerText = atob(t); }
            catch(e) { alert("Error!"); }
        }
        async function scanSystem() {
            let r = document.getElementById('scanResult');
            r.innerText = "Scanning...";
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                r.innerHTML = "IP: " + data.ip + "<br>OS: " + navigator.platform;
            } catch(e) { r.innerText = "Scan Failed!"; }
        }
    </script>
</body>
</html>
