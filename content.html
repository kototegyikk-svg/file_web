<style>
    body {
        background-color: #000;
        color: #0f0;
        font-family: 'Courier New', monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }
    .container {
        text-align: center;
        width: 90%;
        max-width: 600px;
    }
    .tool-card {
        background: rgba(0, 20, 0, 0.8);
        border: 1px solid #0f0;
        padding: 20px;
        margin: 20px 0;
        box-shadow: 0 0 15px #0f0;
    }
    textarea {
        width: 100%;
        height: 80px;
        background: #000;
        color: #0f0;
        border: 1px solid #0f0;
        padding: 10px;
        margin-bottom: 10px;
        box-sizing: border-box;
    }
    button {
        background: #0f0;
        color: #000;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
    }
    button:hover {
        background: #008800;
        color: #fff;
    }
    .result {
        margin-top: 15px;
        padding: 10px;
        border-top: 1px dashed #0f0;
        word-break: break-all;
    }
</style>
<div class="container">
    <h1 class="glitch" data-text="UTILITY HUB">UTILITY HUB</h1>

    <!-- ၁။ Encryptor/Decryptor Section -->
    <div class="tool-card">
        <h3>[ SECRET MESSENGER ]</h3>
        <textarea id="cryptoText" placeholder="ပြောချင်တဲ့စာသားရိုက်ထည့်ပါ..."></textarea>
        <div class="buttons">
            <button onclick="encrypt()">ENCRYPT</button>
            <button onclick="decrypt()">DECRYPT</button>
        </div>
        <div id="cryptoResult" class="result"></div>
    </div>

    <!-- ၂။ Anonymous File Sharer Section -->
    <div class="tool-card">
        <h3>[ ANONYMOUS UPLOADER ]</h3>
        <input type="file" id="fileInput">
        <button onclick="uploadFile()">UPLOAD TO CLOUD</button>
        <div id="fileResult" class="result"></div>
    </div>
</div>

<script>
async function uploadFile() {
    const fileInput = document.getElementById('fileInput');
    const fileResult = document.getElementById('fileResult');
    const file = fileInput.files[0];

    if (!file) {
        alert("ကျေးဇူးပြု၍ ဖိုင်အရင်ရွေးပါ!");
        return;
    }

    fileResult.innerText = "UPLOADING TO SECURE SERVER...";
    fileResult.style.color = "#ffff00"; // အဝါရောင် (တင်နေတုန်း)

    let formData = new FormData();
    formData.append('file', file);

    try {
        // file.io API ကို သုံးထားပါတယ် (ဒါက ပိုပြီး အဆင်ပြေပါတယ်)
        const response = await fetch('https://file.io', {
            method: 'POST',
            body: formData
        });

        const result = await response.json();

        if (result.success) {
            fileResult.innerHTML = `
                <span style="color: #0f0;">UPLOAD SUCCESS!</span><br>
                LINK: <a href="${result.link}" target="_blank" style="color: #0f0; text-decoration: underline;">${result.link}</a><br>
                <small>(မှတ်ချက် - ဒီဖိုင်က တစ်ခါဒေါင်းပြီးရင် အလိုအလျောက် ပျက်သွားပါလိမ့်မယ်)</small>
            `;
        } else {
            fileResult.innerText = "UPLOAD FAILED: " + result.message;
            fileResult.style.color = "#ff0000";
        }
    } catch (error) {
        console.error(error);
        fileResult.innerText = "SERVER ERROR! PLEASE TRY AGAIN.";
        fileResult.style.color = "#ff0000";
    }
}
</script>
