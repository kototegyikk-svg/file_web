<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE WHITE MAN | Terminal</title>
    <style>
        :root {
            --hacker-green: #00FF41;
            --dark-green: #003B00;
            --glow-green: rgba(0, 255, 65, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            transition: background 0.1s ease; /* Flash Effect အတွက် */
        }

        /* 1. Matrix Rain Canvas */
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 2. Scanline Effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
            opacity: 0.15;
        }

        /* Main Content Container */
        .container {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--hacker-green);
            text-align: center;
            padding: 20px;
        }

        /* Terminal Box */
        .terminal-box {
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border: 2px solid var(--hacker-green);
            max-width: 90%;
            box-shadow: 0 0 20px var(--hacker-green), 0 0 40px var(--glow-green);
            animation: gloryPulse 3s infinite alternate;
            transition: 0.2s; /* Flash အတွက် */
        }

        @keyframes gloryPulse {
            0% { box-shadow: 0 0 20px var(--hacker-green), 0 0 40px var(--glow-green); }
            100% { box-shadow: 0 0 40px var(--hacker-green), 0 0 80px rgba(0, 255, 65, 0.8); }
        }

        /* 🌟 3. ENTER နှိပ်လိုက်ရင် တောက်လာမယ့် CSS Class */
        .flash-active .terminal-box {
            box-shadow: 0 0 100px var(--hacker-green), 
                        0 0 200px var(--hacker-green),
                        inset 0 0 50px var(--hacker-green) !important;
            border-color: white; /* ဘောင်ကို ဖြူသွားအောင် လုပ်တာ */
            transform: scale(1.05); /* နည်းနည်းလေး ကြီးလာမယ် */
        }

        .flash-active body {
            background: #001a00; /* နောက်ခံကို အစိမ်းရင့်ရောင် ပြောင်းတာ */
        }

        /* The Link Button */
        .entry-link {
            font-size: 2rem;
            color: var(--hacker-green);
            text-decoration: none;
            border: 1px solid var(--hacker-green);
            padding: 10px 20px;
            margin-top: 20px;
            display: inline-block;
            transition: 0.3s;
            cursor: pointer;
            font-weight: bold;
            text-shadow: 0 0 5px var(--hacker-green);
        }

        .entry-link:hover {
            background: var(--hacker-green);
            color: black;
            box-shadow: 0 0 50px var(--hacker-green);
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .entry-link { font-size: 1.2rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>
<div class="scanlines"></div>

<div class="container">
    <div class="terminal-box">
        <h1>THE WHITE MAN</h1>
        <p>> System: Online</p>
        <p>> Created by TheWhitMan</p>
        <br>
        <!-- 🌟 id='entryLink' ထည့်ထားတယ် JS နဲ့ ဖမ်းဖို့ -->
        <a href="content.html" class="entry-link" id="entryLink">[ ENTER ]</a>
    </div>
</div>

<script>
    // --- Binary Matrix Rain (အရှေ့အတိုင်းပဲ) ---
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const binary = "01"; 
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = [];
    for (let x = 0; x < columns; x++) drops[x] = 1;
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = binary.charAt(Math.floor(Math.random() * binary.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 33);

    // resize handle
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    // --- 🌟 4. Sound & Flash Effect JavaScript ---
    const entryLink = document.getElementById('entryLink');
    
    // Mouse တင်ရင် Mechanical Click သံ
    const hoverAudio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
    
    // နှိပ်လိုက်ရင် "စူး" ခနဲ ဖြစ်သွားတဲ့ အသံ (ဥပမာ - Power on sound)
    const clickAudio = new Audio("https://www.soundjay.com/mechanical/sounds/mechanical-clonk-1.mp3");

    // Mouse တင်တဲ့အခါ
    entryLink.addEventListener('mouseenter', () => {
        hoverAudio.currentTime = 0;
        hoverAudio.play().catch(e => console.log("Hover sound failed:", e));
    });

    // 🌟 နှိပ်လိုက်တဲ့အခါ
    entryLink.addEventListener('click', (e) => {
        // နောက် Page ကို ချက်ချင်းမသွားအောင် ခေတ္တတားတာ (Effect ပြဖို့)
        e.preventDefault(); 
        const targetUrl = entryLink.getAttribute('href');

        // အသံဖွင့်
        clickAudio.play().catch(e => console.log("Click sound failed:", e));

        // 🌟 Body မှာ 'flash-active' class ကို ထည့်လိုက်တယ် (တောက်ခနဲ လင်းသွားမယ်)
        document.body.classList.add('flash-active');

        // 🌟 0.3 စက္ကန့် (300ms) ကြာရင် နောက် Page ကို သွားမယ်
        setTimeout(() => {
            window.location.href = targetUrl;
        }, 300);
    });
</script>

</body>
</html>
